<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#667eea">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="description" content="เกมคณิตศาสตร์สนุกๆ สำหรับเด็กประถม">
    <title>🎮 Math Kids Game - เกมคณิตศาสตร์สนุกๆ</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="game-container">
        <!-- Canvas สำหรับ Kaboom.js (ต้องส่ง canvas นี้เข้า kaboom() — ไม่งั้น Kaboom สร้าง canvas ใหม่ที่ไม่มี CSS) -->
        <canvas id="gameCanvas"></canvas>
        <!-- ข้อความภาษาไทย (Kaboom canvas วัด glyph ไทยไม่ได้ → width 0) -->
        <div id="game-ui-overlay" aria-hidden="true"></div>
    </div>

    <!-- Game Modules (Kaboom.js โหลดใน main.js แล้ว) -->
    <script type="module" src="js/main.js"></script>
</body>
</html>
